name: checkpoint_trial_2agent_t50
description: |
  Long-tick checkpoint trial. Two archetype agents, 50 decision rounds, seed 0.
  Used to validate compact handoff artifacts before longer thesis runs.
market:
  slug: will-tesla-launch-a-driverless-robotaxi-service-by-october-31
  asof: market_open
agent:
  population: archetype
  n_agents: 2
  seed: 0
  belief_update_enabled: true
environment:
  observer: quote_only
  seeder: from_clob_history
  fees_override_bps: 0.0
llm:
  model: null
  temperature: 1.0
  timeout_s: 120.0
  retry: {max_attempts: 3, backoff_base_s: 2.0}
  thinking: false
  concurrency: 2
experiment:
  n_ticks_override: 50
  checkpoint_enabled: true
  checkpoint_interval_ticks: 5
  checkpoint_compact_char_budget: 60000
  checkpoint_recent_ticks: 5
output:
  dual_write_clickhouse: false
  parquet_compression: zstd
  output_dir: output/v14/checkpoint_trial
