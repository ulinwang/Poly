name: c6_model_hetero_s2
description: |
  Model-heterogeneity experiment (RESERVED SCAFFOLD — not runnable yet).
  Roman Roy resolved market, fixed 20 agents, seed 2. Holds every
  parameter fixed except that agents are split across two different LLM
  models, to isolate how mixing model backends shapes simulated trader
  behaviour. The homogeneous control is the main baseline (single model,
  no model_mix). Pending multi-model API access: the model names below
  are PLACEHOLDERS — replace with the real model ids before running, and
  the runner's per-agent model-assignment wiring must be completed.
market:
  slug: will-roman-roy-be-ceo-at-the-end-of-succession-s4
  asof: market_open
agent:
  population: archetype
  n_agents: 20
  seed: 2
  belief_update_enabled: true
  # RESERVED — placeholder model ids; fill when multi-model API is ready.
  model_mix:
    - {model: "MODEL_A_PLACEHOLDER", weight: 0.5}
    - {model: "MODEL_B_PLACEHOLDER", weight: 0.5}
environment:
  observer: quote_only
  seeder: from_clob_history
llm:
  model: null
  temperature: 1.0
  timeout_s: 120.0
  retry: {max_attempts: 3, backoff_base_s: 2.0}
  concurrency: null
output:
  dual_write_clickhouse: false
  parquet_compression: zstd
  output_dir: output/v13/c6
