name: c5_thinking_off_s2
description: |
  Thinking-mode experiment. Roman Roy resolved market, fixed 20 agents,
  seed 2. Compares the DeepSeek hybrid reasoning mode on vs off,
  holding every other parameter fixed, to isolate how the language
  model's explicit reasoning step shapes simulated trader behaviour.
  Variant: thinking off.
market:
  slug: will-roman-roy-be-ceo-at-the-end-of-succession-s4
  asof: market_open
agent:
  population: archetype
  n_agents: 20
  seed: 2
  belief_update_enabled: true
environment:
  observer: quote_only
  seeder: from_clob_history
llm:
  model: null
  temperature: 1.0
  timeout_s: 120.0
  retry: {max_attempts: 3, backoff_base_s: 2.0}
  concurrency: null
  thinking: false
output:
  dual_write_clickhouse: false
  parquet_compression: zstd
  output_dir: output/v13/c5
