name: c1_closed_scale_n10_s2
description: |
  Closed-market scale experiment. Roman Roy resolved market, 10 agents,
  seed 2. Used to compare micro/macro behaviour across population sizes.
market:
  slug: will-roman-roy-be-ceo-at-the-end-of-succession-s4
  asof: market_open
agent:
  population: archetype
  n_agents: 10
  seed: 2
  belief_update_enabled: true
environment:
  observer: quote_only
  seeder: from_clob_history
llm:
  model: null
  temperature: 1.0
  timeout_s: 120.0
  retry: {max_attempts: 3, backoff_base_s: 2.0}
  concurrency: null
output:
  dual_write_clickhouse: false
  parquet_compression: zstd
  output_dir: output/v13/c1
