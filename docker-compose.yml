services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - "8765:8765"
    volumes:
      - ./apps/server/data:/app/apps/server/data
    environment:
      - PORT=8765
      - HOST=0.0.0.0
      - NODE_ENV=production
      - DATA_DIR=/app/apps/server/data
      - POLY_ROOT=/app
    restart: unless-stopped
