name: c2_open_preview_spacex_n20_s1
description: |
  Open-market preview experiment. SpaceX Flight Test 11 market, 20 agents,
  seed 1. Used to produce pre-close price and behaviour signals without
  settlement scoring.
market:
  slug: will-the-chopsticks-catch-spacex-starship-flight-test-11-superheavy-booster
  asof: market_open
agent:
  population: calibrated
  n_agents: 20
  seed: 1
  belief_update_enabled: true
environment:
  observer: quote_only
  seeder: from_clob_history
llm:
  model: null
  temperature: 1.0
  timeout_s: 120.0
  retry: {max_attempts: 3, backoff_base_s: 2.0}
  concurrency: null
output:
  dual_write_clickhouse: false
  parquet_compression: zstd
  output_dir: output/v13/c2
