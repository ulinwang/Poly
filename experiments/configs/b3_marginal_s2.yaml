name: b3_marginal_s2
description: "v13 B3 \u2014 Cluster-structure ablation, variant='marginal' (persona_set='marginal_random'),\
  \ seed=2 on Roman-Roy reference market."
market:
  slug: will-roman-roy-be-ceo-at-the-end-of-succession-s4
  asof: market_open
agent:
  population: marginal_random
  n_agents: 30
  seed: 2
  belief_update_enabled: false
environment:
  observer: quote_only
  seeder: from_clob_history
llm:
  model: null
  temperature: 1.0
  timeout_s: 120.0
  retry:
    max_attempts: 3
    backoff_base_s: 2.0
  concurrency: null
output:
  dual_write_clickhouse: false
  parquet_compression: zstd
  output_dir: output/v13/b3
