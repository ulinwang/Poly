name: c3_ethereum_t50_s2
description: |
  Tick-horizon experiment (ethereum base market), 50 rounds, seed 2.
market:
  slug: will-ethereum-reach-5000-in-august-614-348-169-974-494
  asof: market_open
agent:
  population: archetype
  n_agents: 20
  seed: 2
  belief_update_enabled: true
environment:
  observer: quote_only
  seeder: from_clob_history
  fees_override_bps: 0
llm:
  model: null
  temperature: 1.0
  timeout_s: 120.0
  retry: {max_attempts: 3, backoff_base_s: 2.0}
  concurrency: 32
experiment:
  n_ticks_override: 50
output:
  dual_write_clickhouse: false
  parquet_compression: zstd
  output_dir: output/v14/c3_ethereum
