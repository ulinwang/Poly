name: c5_robotaxi_off_s2
description: |
  Thinking-mode experiment (robotaxi base), thinking off, seed 2.
market:
  slug: will-tesla-launch-a-driverless-robotaxi-service-by-october-31
  asof: market_open
agent:
  population: archetype
  n_agents: 20
  seed: 2
  belief_update_enabled: true
environment:
  observer: quote_only
  seeder: from_clob_history
  fees_override_bps: 0
llm:
  model: null
  temperature: 1.0
  timeout_s: 120.0
  retry: {max_attempts: 3, backoff_base_s: 2.0}
  concurrency: 32
  thinking: false
experiment:
  n_ticks_override: 20
output:
  dual_write_clickhouse: false
  parquet_compression: zstd
  output_dir: output/v14/c5_robotaxi
