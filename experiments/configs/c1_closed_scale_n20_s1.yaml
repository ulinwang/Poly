name: c1_closed_scale_n20_s1
description: |
  Closed-market scale experiment. Roman Roy resolved market, 20 agents,
  seed 1. Used to compare micro/macro behaviour across population sizes.
market:
  slug: will-roman-roy-be-ceo-at-the-end-of-succession-s4
  asof: market_open
agent:
  population: archetype
  n_agents: 20
  seed: 1
  belief_update_enabled: true
environment:
  observer: quote_only
  seeder: from_clob_history
llm:
  model: null
  temperature: 0.0
  timeout_s: 120.0
  retry: {max_attempts: 3, backoff_base_s: 2.0}
  concurrency: null
output:
  dual_write_clickhouse: false
  parquet_compression: zstd
  output_dir: output/v13/c1
