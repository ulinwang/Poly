name: succession_roman
description: |
  Small-population test: "Will Roman Roy be CEO at the end of Succession S4?"
  Resolved NO (2023-07-29). 9 calibrated wallets. Quick smoke run for the
  v8.1 tool-calling decision flow.

market:
  slug: will-roman-roy-be-ceo-at-the-end-of-succession-s4
  asof: market_open

agent:
  population: calibrated
  features: [wallet, market, temporal]
  persona_recipe:
    use_bio: true
    sanitize_labels: true
    llm_temperature: 1.0
  n_agents: null
  seed: 0

environment:
  observer: quote_only
  seeder: from_clob_history
  fees_override_bps: null

llm:
  model: null            # uses POLYMETL_DEEPSEEK_MODEL from .env
  temperature: 1.0
  timeout_s: 120.0
  retry:
    max_attempts: 3
    backoff_base_s: 2.0

output:
  dual_write_clickhouse: true
  parquet_compression: zstd
  output_dir: output
